<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Middle Yeast</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #faf7f2;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .logo {
      font-size: 22px;
      font-weight: bold;
    }
    .menu {
      font-size: 22px;
      cursor: pointer;
    }
    .hero {
      padding: 50px 20px;
      text-align: center;
    }
    .options {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .box {
      padding: 30px;
      background: white;
      border-radius: 10px;
      width: 120px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-weight: bold;
    }
    .ad {
      margin: 40px auto;
      width: 80%;
      height: 120px;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MY</div>
  <div class="menu">⋮</div>
</header>

<section class="hero">
  <h1>Middle Yeast</h1>
  <p>Oh MY! Fresh Dough, Fresh Flavor</p>

  <div class="options">
    <div class="box">Delivery</div>
    <div class="box">Pickup</div>
  </div>

  <div class="ad">
    Ad Space
  </div>
</section>

</body>
</html>
